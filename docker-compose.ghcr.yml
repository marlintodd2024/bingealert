# BingeAlert v3 - Pre-built image (recommended for self-hosters).
#
# Quick start:
#   1. mkdir -p data && chown 1000:1000 data
#   2. export DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
#   3. docker compose -f docker-compose.ghcr.yml up -d
#   4. Open http://your-host:8000  (setup wizard runs on first boot)
#
# DOCKER_GID gives the container's non-root user permission to read
# /var/run/docker.sock so the admin Logs tab can stream this container's
# logs. If you skip step 2, group_add gets the literal "docker" string
# which fails on most distros -- the Logs tab will return 503 until you
# re-up with the right GID.
#
# All configuration is collected by the in-app wizard and persisted to
# ./data/config.json. If you want to skip the wizard (e.g. for automation),
# create an .env file matching .env.example and uncomment the env_file: line
# below; matching env vars take effect when the wizard hasn't been completed.

services:
  bingealert:
    image: ghcr.io/marlintodd2024/bingealert:latest
    container_name: bingealert
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # The container runs as a non-root user; this supplementary group gives
    # it read access to the docker socket above. Set DOCKER_GID in your
    # shell to match `stat -c '%g' /var/run/docker.sock` on the host.
    group_add:
      - "${DOCKER_GID:-docker}"
    # env_file:
    #   - .env
    restart: unless-stopped
