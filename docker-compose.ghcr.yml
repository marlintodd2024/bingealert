# BingeAlert v2 - Pre-built image (recommended for self-hosters).
#
# Quick start:
#   1. mkdir -p data && chown 1000:1000 data
#   2. docker compose -f docker-compose.ghcr.yml up -d
#   3. Open http://your-host:8000  (setup wizard runs on first boot)
#
# All configuration is collected by the in-app wizard and persisted to
# ./data/config.json. If you want to skip the wizard (e.g. for automation),
# create an .env file matching .env.example and uncomment the env_file: line
# below; matching env vars take effect when the wizard hasn't been completed.

services:
  bingealert:
    image: ghcr.io/marlintodd2024/bingealert:latest
    container_name: bingealert
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    # env_file:
    #   - .env
    restart: unless-stopped
