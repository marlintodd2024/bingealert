# BingeAlert v3 branch staging deployment.
#
# This stack is intentionally isolated from the normal BingeAlert deployment:
# - project/container: bingealert-v3-dev
# - image: bingealert:v3-staging
# - host port: 127.0.0.1:8010
# - data: ./data-v3-dev
#
# See docs/V3_STAGING_DEPLOYMENT.md before connecting live webhooks or SMTP.

name: bingealert-v3-dev

services:
  bingealert:
    build:
      context: .
      args:
        BUILD_SHA: "${BINGEALERT_BUILD_SHA:-local}"
        BUILD_TAG: "${BINGEALERT_BUILD_TAG:-v3-staging}"
    image: bingealert:v3-staging
    container_name: bingealert-v3-dev
    ports:
      - "${BINGEALERT_V3_BIND_IP:-127.0.0.1}:${BINGEALERT_V3_PORT:-8010}:8000"
    volumes:
      - ./data-v3-dev:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      ENVIRONMENT: production
      PUBLIC_BASE_URL: "${BINGEALERT_V3_PUBLIC_URL:-https://binge.dev.marlintodd.com}"
    group_add:
      - "${DOCKER_GID:?Set DOCKER_GID to the group owning /var/run/docker.sock}"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json, urllib.request; payload = json.load(urllib.request.urlopen("http://127.0.0.1:8000/health/", timeout=3)); raise SystemExit(0 if payload.get("status") == "healthy" else 1)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 30s
