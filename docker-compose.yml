version: '3.8'

services:
  bingealert-db:
    image: postgres:15
    container_name: bingealert-db
    environment:
      POSTGRES_USER: ${DB_USER:-notifyuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      POSTGRES_DB: ${DB_NAME:-notifications}
    volumes:
      - bingealert_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-notifyuser} -d ${DB_NAME:-notifications}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  bingealert:
    build: .
    container_name: bingealert
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-changeme123}
      DB_USER: ${DB_USER:-notifyuser}
      DB_NAME: ${DB_NAME:-notifications}
      DB_HOST: bingealert-db
      DB_PORT: ${DB_PORT:-5432}
      JELLYSEERR_URL: ${JELLYSEERR_URL}
      JELLYSEERR_API_KEY: ${JELLYSEERR_API_KEY}
      SONARR_URL: ${SONARR_URL}
      SONARR_API_KEY: ${SONARR_API_KEY}
      RADARR_URL: ${RADARR_URL}
      RADARR_API_KEY: ${RADARR_API_KEY}
      PLEX_URL: ${PLEX_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-BingeAlert <your_email@gmail.com>}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-changeme-generate-random-key}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8000:8000"
    depends_on:
      bingealert-db:
        condition: service_healthy
    volumes:
      - ./data:/data
      - ./.env:/app/.env
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  bingealert_postgres_data:
