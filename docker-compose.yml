# BingeAlert v2 - Local development (builds from source).
#
# Quick start:
#   1. mkdir -p data && chown 1000:1000 data
#   2. docker compose up --build
#   3. Open http://localhost:8000  (setup wizard runs on first boot)

services:
  bingealert:
    build: .
    container_name: bingealert
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      # Live-reload bind mounts -- handy for development, remove for prod-like runs.
      - ./app:/app/app
      - ./alembic:/app/alembic
    # env_file:
    #   - .env
    restart: unless-stopped
