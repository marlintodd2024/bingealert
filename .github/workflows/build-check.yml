name: Build Check

# Verifies the Dockerfile builds on every push and PR, *without* pushing to GHCR.
# Continuous signal during the v2 rebuild and beyond. Multi-arch verification
# stays in docker-publish.yml (tag-only) so this workflow stays fast.

on:
  push:
    branches:
      - main
      - v2
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: bingealert:build-check
